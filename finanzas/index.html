<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#412402">
<title>Bananísimo · Finanzas</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --cacao:#412402;--dorado:#BA7517;--banano:#EF9F27;
  --crema:#FAEEDA;--crema-dark:#f0e0c0;
  --hoja:#3B6D11;--rojo:#c0392b;--amarillo:#d4a017;--azul:#1a5276;
  --bg:#f5f0e8;--white:#fff;--text:#2C2C2A;--text-muted:#888780;
  --border:rgba(44,44,42,0.12);--border-strong:rgba(44,44,42,0.22);
  --radius:14px;--radius-sm:9px;
}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;max-width:430px;margin:0 auto;padding-bottom:80px;}
/* TOPBAR */
.topbar{background:var(--cacao);padding:14px 18px 12px;position:sticky;top:0;z-index:100;}
.logo{font-size:18px;font-weight:700;color:var(--banano);}
.logo span{color:var(--crema);}
.logo-sub{font-size:11px;color:rgba(239,159,39,0.7);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
/* NAV */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--white);border-top:0.5px solid var(--border-strong);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;background:none;border:none;cursor:pointer;color:var(--text-muted);font-family:'Quicksand',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.04em;text-transform:uppercase;transition:color 0.15s;}
.nav-btn.active{color:var(--dorado);}
.nav-btn svg{width:20px;height:20px;}
/* SCREENS */
.screen{display:none;padding:16px;}.screen.active{display:block;}
/* LOADING */
.loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.loading-overlay.hidden{display:none;}
.spinner{width:28px;height:28px;border:3px solid var(--crema-dark);border-top-color:var(--dorado);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* CONFIG */
.config-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius);padding:20px;margin:16px;}
.config-note{background:var(--crema);border-radius:var(--radius-sm);padding:10px 12px;font-size:12px;color:var(--cacao);line-height:1.65;margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:6px;}
.form-input{width:100%;border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:11px 13px;font-family:'Quicksand',sans-serif;font-size:14px;font-weight:600;color:var(--text);background:var(--white);outline:none;margin-bottom:14px;-webkit-appearance:none;}
.form-input:focus{border-color:var(--dorado);}
select.form-input{cursor:pointer;}
.btn-primary{width:100%;background:var(--cacao);color:var(--banano);border:none;border-radius:var(--radius-sm);padding:14px;font-family:'Quicksand',sans-serif;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary:disabled{opacity:0.6;}
/* CARDS */
.card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;}
.sec-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;display:block;}
/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.stat-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;}
.stat-val{font-size:22px;font-weight:700;color:var(--cacao);line-height:1;margin-bottom:3px;}
.stat-label{font-size:11px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;}
.stat-sub{font-size:11px;color:var(--dorado);font-weight:600;margin-top:2px;}
/* HEADER FINANCIERO */
.fin-header{border-radius:var(--radius);padding:18px;margin-bottom:14px;background:linear-gradient(135deg,#2c1a08,var(--cacao));}
.fin-main-val{font-size:34px;font-weight:700;color:var(--banano);line-height:1;}
.fin-main-label{font-size:11px;color:rgba(250,238,218,0.7);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-top:4px;}
.fin-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid #F1EFE8;}
.fin-row:last-child{border-bottom:none;}
.fin-label{font-size:13px;color:var(--text-muted);font-weight:600;}
.fin-val{font-size:14px;font-weight:700;}
.fin-val.green{color:var(--hoja);}
.fin-val.red{color:var(--rojo);}
.fin-val.gold{color:var(--dorado);}
/* PROGRESS */
.prog-wrap{background:#F1EFE8;border-radius:20px;height:7px;overflow:hidden;margin:5px 0;}
.prog-fill{height:100%;border-radius:20px;transition:width 0.4s;}
/* ALERTS */
.alert-item{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-radius:var(--radius-sm);margin-bottom:8px;}
.alert-item.warn{background:#fff3cd;border:0.5px solid #ffc107;}
.alert-item.info{background:#e8f4fd;border:0.5px solid #3498db;}
.alert-item.ok{background:#d5f5e3;border:0.5px solid #27ae60;}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert-text{font-size:12px;font-weight:600;line-height:1.5;}
.alert-text.warn{color:#664d03;}
.alert-text.info{color:#1a5276;}
.alert-text.ok{color:#1e8449;}
/* CICLOS */
.ciclo-card{background:var(--white);border:0.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 14px;margin-bottom:8px;cursor:pointer;transition:background 0.15s;}
.ciclo-card:active{background:var(--crema);}
.ciclo-card.abierto{border-left:3px solid var(--dorado);}
.ciclo-card.cerrado{border-left:3px solid var(--hoja);}
.ciclo-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
.ciclo-fecha{font-size:14px;font-weight:700;color:var(--cacao);}
.ciclo-dia{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;text-transform:uppercase;}
.ciclo-dia.martes{background:#fef9e7;color:#7d6608;}
.ciclo-dia.jueves{background:#f0e6ff;color:#6c3483;}
.ciclo-panes{font-size:12px;color:var(--text-muted);font-weight:600;}
.ciclo-ganancia{font-size:16px;font-weight:700;}
/* GASTOS */
.gasto-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:0.5px solid #F1EFE8;}
.gasto-row:last-child{border-bottom:none;}
.gasto-item{font-size:13px;font-weight:600;color:var(--cacao);}
.gasto-cat{font-size:10px;font-weight:700;padding:1px 7px;border-radius:20px;margin-top:2px;display:inline-block;}
.gasto-cat.ingredientes{background:#e8f4fd;color:#1a5276;}
.gasto-cat.empaque{background:#f0e6ff;color:#6c3483;}
.gasto-cat.operacion{background:#fef9e7;color:#7d6608;}
.gasto-cat.equipo{background:#fde8e8;color:#922b21;}
.gasto-monto{font-size:14px;font-weight:700;color:var(--rojo);}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(65,36,2,0.55);z-index:200;display:none;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-sheet{background:var(--white);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + env(safe-area-inset-bottom));width:100%;max-width:430px;max-height:92dvh;overflow-y:auto;}
.modal-handle{width:40px;height:4px;background:#D3D1C7;border-radius:2px;margin:0 auto 18px;}
.modal-title{font-size:18px;font-weight:700;color:var(--cacao);margin-bottom:16px;}
.modal-actions{display:flex;flex-direction:column;gap:8px;margin-top:18px;}
.btn-modal{width:100%;padding:13px;border-radius:var(--radius-sm);font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;}
.btn-modal.primary{background:var(--cacao);color:var(--banano);}
.btn-modal.danger{background:#fde8e8;color:#922b21;}
.btn-close{background:transparent;color:var(--text-muted);border:0.5px solid var(--border-strong);border-radius:var(--radius-sm);padding:12px;font-family:'Quicksand',sans-serif;font-size:14px;font-weight:600;cursor:pointer;width:100%;margin-top:4px;}
/* TABS */
.view-tabs{display:flex;gap:6px;margin-bottom:14px;}
.view-tab{flex:1;padding:8px 4px;border-radius:var(--radius-sm);border:0.5px solid var(--border-strong);background:var(--white);font-family:'Quicksand',sans-serif;font-size:11px;font-weight:700;color:var(--text-muted);cursor:pointer;text-align:center;text-transform:uppercase;}
.view-tab.active{background:var(--cacao);color:var(--banano);border-color:var(--cacao);}
/* AMORT BADGE */
.amort-badge{background:var(--crema);border:0.5px solid var(--dorado);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:var(--cacao);}
/* NAV ARROWS */
.nav-arrow-btn{background:rgba(255,255,255,0.14);border:0.5px solid rgba(255,255,255,0.25);color:var(--crema);border-radius:8px;width:34px;height:34px;font-size:16px;cursor:pointer;font-family:monospace;}
.nav-arrow-btn:disabled{opacity:0.25;cursor:default;}
/* TOAST */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--cacao);color:var(--crema);padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:300;white-space:nowrap;opacity:0;transition:opacity 0.2s;pointer-events:none;}
.toast.show{opacity:1;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-muted);}
.empty-state .e-icon{font-size:40px;margin-bottom:12px;}
.empty-state .e-title{font-size:15px;font-weight:700;color:var(--cacao);margin-bottom:6px;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="logo">Banan<span>í</span>simo</div>
  <div style="font-size:11px;color:var(--text-muted);font-weight:600;letter-spacing:0.08em;text-transform:uppercase;">Finanzas</div>
  <div class="spinner"></div>
</div>

<div id="configScreen" style="display:none;">
  <div class="topbar"><div class="logo">Banan<span>í</span>simo · <span style="color:var(--crema);">Finanzas</span></div></div>
  <div class="config-card">
    <div style="font-size:18px;font-weight:700;color:var(--cacao);margin-bottom:6px;">Conectar Supabase</div>
    <div style="font-size:13px;color:var(--text-muted);margin-bottom:18px;line-height:1.6;">Usá las mismas credenciales de la app de pedidos.</div>
    <div class="config-note"><strong>Supabase</strong> → Settings → API Keys → Project URL + Publishable key</div>
    <label class="form-label">Project URL</label>
    <input class="form-input" id="cfgUrl" type="url" placeholder="https://xxxx.supabase.co">
    <label class="form-label">Publishable Key</label>
    <input class="form-input" id="cfgKey" type="text" placeholder="sb_publishable_...">
    <button class="btn-primary" onclick="saveConfig()">Conectar →</button>
  </div>
</div>

<div id="mainApp" style="display:none;">
  <div class="topbar">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div><div class="logo">Banan<span>í</span>simo</div><div class="logo-sub">Finanzas</div></div>
      <div id="amortBadge" class="amort-badge" style="display:none;"></div>
    </div>
  </div>

  <div class="screen active" id="screen-resumen"></div>
  <div class="screen" id="screen-ciclos"></div>
  <div class="screen" id="screen-gastos"></div>
  <div class="screen" id="screen-config"></div>

  <nav class="bottom-nav">
    <button class="nav-btn active" onclick="showScreen('resumen',this)" id="nav-resumen">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Resumen
    </button>
    <button class="nav-btn" onclick="showScreen('ciclos',this)" id="nav-ciclos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Ciclos
    </button>
    <button class="nav-btn" onclick="showScreen('gastos',this)" id="nav-gastos">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
      Gastos
    </button>
    <button class="nav-btn" onclick="showScreen('config',this)" id="nav-config">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
      Config
    </button>
  </nav>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal-sheet"><div class="modal-handle"></div><div id="modalContent"></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
// ── ESTADO ────────────────────────────────────────────────────
let sb=null, orders=[], ciclos=[], gastos=[], cfg={}, panesAcum=0, payments=[];
let currentScreen='resumen', currentCicloId=null;
let resumenView='semana', resumenOffset=0;

// ── CONFIG ────────────────────────────────────────────────────
function loadConfig(){return{url:localStorage.getItem('sb_url_fin')||localStorage.getItem('sb_url')||'',key:localStorage.getItem('sb_key_fin')||localStorage.getItem('sb_key')||''};}
function saveConfig(){
  const url=document.getElementById('cfgUrl').value.trim();
  const key=document.getElementById('cfgKey').value.trim();
  if(!url||!key){showToast('⚠️ Completá los dos campos');return;}
  localStorage.setItem('sb_url_fin',url);localStorage.setItem('sb_key_fin',key);
  initApp();
}

async function initApp(){
  const{url,key}=loadConfig();
  if(!url||!key){document.getElementById('loadingOverlay').classList.add('hidden');document.getElementById('configScreen').style.display='block';return;}
  try{
    sb=supabase.createClient(url,key);
    const[r1,r2,r3,r4,r5,r6]=await Promise.all([
      sb.from('orders').select('id,product_id,qty,price,stage,order_date,week_key,created_at').order('created_at',{ascending:false}).limit(500),
      sb.from('ciclos').select('*').order('fecha',{ascending:false}),
      sb.from('gastos').select('*').order('fecha',{ascending:false}),
      sb.from('config_finanzas').select('*'),
      sb.from('panes_acumulados').select('total').eq('id',1).single(),
      sb.from('payments').select('order_id,amount,payment_date,created_at'),
    ]);
    if(r1.error)throw r1.error;
    orders=r1.data||[];ciclos=r2.data||[];gastos=r3.data||[];
    cfg={};(r4.data||[]).forEach(c=>cfg[c.clave]=c.valor);
    panesAcum=(r5.data?.total)||0;
    payments=r6.data||[];
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('mainApp').style.display='block';
    updateAmortBadge();renderResumen();
  }catch(e){
    console.error(e);
    document.getElementById('loadingOverlay').classList.add('hidden');
    document.getElementById('configScreen').style.display='block';
    showToast('❌ Error de conexión');
  }
}

// ── HELPERS ───────────────────────────────────────────────────
function fp(n){return'₡'+Number(n||0).toLocaleString('es-CR');}
function showToast(msg,d=2400){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),d);}
function showScreen(name,btn){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
  (btn||document.getElementById('nav-'+name)).classList.add('active');
  currentScreen=name;renderScreen(name);
}
function renderScreen(n){({resumen:renderResumen,ciclos:renderCiclos,gastos:renderGastos,config:renderConfigScreen})[n]?.();}
function closeModal(e){if(e&&e.target!==document.getElementById('modalOverlay'))return;document.getElementById('modalOverlay').classList.remove('open');}
function openModal(html){document.getElementById('modalContent').innerHTML=html;document.getElementById('modalOverlay').classList.add('open');}

function getWeekKey(d){
  let x=d?new Date(typeof d==='string'&&d.length===10?d+'T12:00:00':d):new Date();
  const y=x.getFullYear(),m=x.getMonth(),day=x.getDate();
  const tmp=new Date(y,m,day);const dow=tmp.getDay();
  tmp.setDate(tmp.getDate()+(dow===0?-6:1-dow));
  return tmp.getFullYear()+'-'+String(tmp.getMonth()+1).padStart(2,'0')+'-'+String(tmp.getDate()).padStart(2,'0');
}
function getOffsetWeekKey(offset){const d=new Date();d.setDate(d.getDate()+offset*7);return getWeekKey(d);}
function getMonthRange(offset){
  const d=new Date();d.setDate(1);d.setMonth(d.getMonth()+offset);
  const months=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  return{from:new Date(d.getFullYear(),d.getMonth(),1).toISOString().slice(0,10),to:new Date(d.getFullYear(),d.getMonth()+1,0).toISOString().slice(0,10),label:months[d.getMonth()]+' '+d.getFullYear()};
}
function orderDate(o){return(o.order_date||o.week_key||o.created_at).slice(0,10);}
function ordersForPeriod(from,to){return orders.filter(o=>{const d=orderDate(o);return d>=from&&d<=to;});}
function ordersForWeek(wk){return orders.filter(o=>getWeekKey(orderDate(o))===wk);}

// ── COSTO ─────────────────────────────────────────────────────
function costoPan(productId){
  // Detectar product_id real — puede ser uuid o texto corto
  const isSemi=productId&&(productId==='semi'||productId.toLowerCase().includes('semi')||productId.toLowerCase().includes('semilla'));
  const ing=isSemi?(cfg.costo_ing_semi||1618):(cfg.costo_ing_trad||1468);
  const empaque=cfg.costo_empaque_base||351;
  const amort=panesAcum<(cfg.panes_amort_total||100)?(cfg.costo_amort_pan||111):0;
  return ing+empaque+amort;
}
function calcGanancia(ordersList){
  return ordersList.reduce((s,o)=>s+(o.qty*o.price)-(costoPan(o.product_id)*o.qty),0);
}
function calcIngresos(ordersList){return ordersList.reduce((s,o)=>s+(o.qty*o.price),0);}
function calcCostos(ordersList){return ordersList.reduce((s,o)=>s+(costoPan(o.product_id)*o.qty),0);}
function totalPanes(ordersList){return ordersList.filter(o=>o.stage!=='cancelado').reduce((s,o)=>s+o.qty,0);}

function updateAmortBadge(){
  const badge=document.getElementById('amortBadge');
  if(!badge)return;
  const total=cfg.panes_amort_total||100;
  if(panesAcum>=total){badge.textContent='✓ Equipo amortizado';badge.style.display='inline-block';badge.style.color='var(--hoja)';}
  else if(panesAcum>=90){badge.textContent=`⚡ ${total-panesAcum} panes para amortizar`;badge.style.display='inline-block';}
  else badge.style.display='none';
}

function buildAlerts(activeOrders,weekTotal){
  const alerts=[];
  const ing=calcIngresos(activeOrders);const cos=calcCostos(activeOrders);
  const margen=ing>0?(ing-cos)/ing:0;
  if(margen>0&&margen<0.35)alerts.push({type:'warn',msg:`Margen en riesgo: ${Math.round(margen*100)}% — revisá costos`});
  if(weekTotal>0&&weekTotal<4)alerts.push({type:'warn',msg:`Bajo volumen esta semana: ${weekTotal} panes`});
  if(weekTotal>=8)alerts.push({type:'ok',msg:'¡Capacidad máxima alcanzada esta semana!'});
  const tot=cfg.panes_amort_total||100;
  if(panesAcum>=tot)alerts.push({type:'ok',msg:'Equipo amortizado — costo baja ₡111/pan'});
  else if(panesAcum>=90)alerts.push({type:'info',msg:`Equipo casi amortizado — ${tot-panesAcum} panes restantes`});
  return alerts;
}

// ── RESUMEN ───────────────────────────────────────────────────
let customFrom='',customTo='';

function getPeriod(){
  let periodOrders,from,to,label,canNext=false;
  if(resumenView==='semana'){
    const wk=getOffsetWeekKey(resumenOffset);
    from=wk; to=wk;
    periodOrders=ordersForWeek(wk);
    label=resumenOffset===0?'Esta semana':resumenOffset===-1?'Semana pasada':'Hace '+Math.abs(resumenOffset)+' semanas';
    canNext=resumenOffset<0;
  } else if(resumenView==='mes'){
    const r=getMonthRange(resumenOffset);from=r.from;to=r.to;
    periodOrders=ordersForPeriod(from,to);label=r.label;canNext=resumenOffset<0;
  } else {
    from=customFrom||'';to=customTo||'';
    periodOrders=(from&&to)?ordersInPeriod(from,to):[];
    label=from&&to?from+' → '+to:'Seleccioná rango';
  }
  return{periodOrders,from,to,label,canNext};
}

function ordersInPeriod(from,to){
  return orders.filter(o=>{const d=orderDate(o);return d>=from&&d<=to;});
}

function gastosInPeriod(from,to){
  return gastos.filter(g=>g.fecha>=from&&g.fecha<=to);
}

function renderResumen(){
  const el=document.getElementById('screen-resumen');
  const{periodOrders,from,to,label,canNext}=getPeriod();

  const active=periodOrders.filter(o=>o.stage!=='cancelado');
  const entregados=periodOrders.filter(o=>o.stage==='entregado');

  // Ingresos — todos los pedidos activos del período
  const ingBrutos=calcIngresos(active);
  const costosProd=calcCostos(active);
  // Ingresos reales cobrados (entregados)

  // Gastos reales del período (tabla gastos)
  const gastPeriod = resumenView==='semana'
    ? gastosInPeriod(getOffsetWeekKey(resumenOffset), getOffsetWeekKey(resumenOffset)+'z') // semana completa
    : (from&&to ? gastosInPeriod(from,to) : []);
  // Para semana usamos un rango de 7 días
  const wkStart = resumenView==='semana' ? getOffsetWeekKey(resumenOffset) : from;
  const wkEnd   = resumenView==='semana' ? (() => {
    const d=new Date(wkStart+'T12:00:00');d.setDate(d.getDate()+6);
    return d.toISOString().slice(0,10);

// ── CICLOS — calculados desde orders ──────────────────────────

// Detectar si un product_id corresponde a semillas
function paidForOrder(orderId){
  return payments.filter(p=>p.order_id===orderId).reduce((s,p)=>s+p.amount,0);
}
function isSemi(productId){
  if(!productId)return false;
  const p=productId.toLowerCase();
  return p==='semi'||p.includes('semi')||p.includes('semilla');
}

// Agrupar orders por ciclo (week_key + cycle_id)
function buildCiclosFromOrders(){
  const map={};
  orders.filter(o=>o.stage!=='cancelado').forEach(o=>{
    const wk=o.week_key||(o.order_date?getWeekKey(o.order_date):getWeekKey(o.created_at));
    const cycleId=o.cycle_id||'?';
    const key=wk+'__'+cycleId;
    if(!map[key]){
      map[key]={
        key, wk, cycleId,
        dia: cycleId==='mar'||cycleId==='martes'?'martes':'jueves',
        fecha: wk,
        orders:[], panesTotal:0, panesTrad:0, panesSemi:0,
        ingresos:0, costos:0,
        cobrado:0, porCobrar:0,
        // buscar si existe en tabla ciclos para notas/estado
        dbCiclo: ciclos.find(c=>c.fecha===wk&&(c.dia===(cycleId==='mar'?'martes':'jueves')))||null,
      };
    }
    const c=map[key];
    c.orders.push(o);
    const qty=o.qty||0;
    c.panesTotal+=qty;
    if(isSemi(o.product_id)){c.panesSemi+=qty;}else{c.panesTrad+=qty;}
    c.ingresos+=qty*o.price;
    c.costos+=costoPan(o.product_id)*qty;
    // Calcular cobrado desde allPayments no disponible aquí — usar campo paid_amount si existe
    const paid=paidForOrder(o.id);
    c.cobrado+=paid;
    c.porCobrar+=Math.max(0,qty*o.price-paid);
  });
  // Ordenar por fecha desc
  return Object.values(map).sort((a,b)=>b.fecha.localeCompare(a.fecha));
}

      <button class="btn-modal primary" onclick="openNuevoGastoParaCiclo(${dbCiclo?`'${dbCiclo.id}'`:'null'})">+ Agregar gasto</button>
      ${estado==='abierto'?`<button class="btn-modal" style="background:#d5f5e3;color:#1e8449;" onclick="cerrarCicloByKey('${key}')">✓ Cerrar ciclo</button>`:''}
      <button class="btn-modal" style="background:var(--crema);color:var(--cacao);border:0.5px solid var(--border-strong);" onclick="editarNotasCiclo('${key}')">📝 Agregar nota</button>
      <button class="btn-close" onclick="closeModal()">Cerrar</button>
    </div>
  `);
}

async function cerrarCicloByKey(key){
  const ciclosCalc=buildCiclosFromOrders();
  const c=ciclosCalc.find(x=>x.key===key);if(!c)return;
  try{
    if(c.dbCiclo){
      // Ya existe en tabla ciclos, solo cerrar
      await sb.from('ciclos').update({estado:'cerrado'}).eq('id',c.dbCiclo.id);
      const i=ciclos.findIndex(x=>x.id===c.dbCiclo.id);
      if(i>=0)ciclos[i]={...ciclos[i],estado:'cerrado'};
    } else {
      // Crear entrada en tabla ciclos solo para guardar estado
      const diaVal=['martes','jueves'].includes(c.dia)?c.dia:c.cycleId==='mar'?'martes':'jueves';
      const{data,error}=await sb.from('ciclos').insert({
        fecha:c.fecha,dia:diaVal,estado:'cerrado',
        panes_trad:c.panesTrad,panes_semi:c.panesSemi
      }).select().single();
      if(error)throw error;
      ciclos.unshift(data);
    }
    closeModal();showToast('✓ Ciclo cerrado');renderCiclos();
  }catch(e){showToast('Error: '+e.message);}
}

async function editarNotasCiclo(key){
  const ciclosCalc=buildCiclosFromOrders();
  const c=ciclosCalc.find(x=>x.key===key);if(!c)return;
  const notaActual=c.dbCiclo?.notas||'';
  openModal(`
    <p class="modal-title">Nota del ciclo</p>
    <p style="font-size:13px;color:var(--text-muted);margin-bottom:14px;">${c.fecha} · ${c.dia}</p>
    <div style="margin-bottom:14px;">
      <label class="form-label">Nota</label>
      <input class="form-input" id="nota_input" type="text" value="${notaActual}" placeholder="Ej: Horneado con nuevo aceite..." style="margin-bottom:0;">
    </div>
    <div class="modal-actions">
      <button class="btn-modal primary" onclick="guardarNotaCiclo('${key}')">Guardar nota</button>
      <button class="btn-close" onclick="openCicloModalByKey('${key}')">← Volver</button>
    </div>
  `);
}

async function guardarNotaCiclo(key){
  const ciclosCalc=buildCiclosFromOrders();
  const c=ciclosCalc.find(x=>x.key===key);if(!c)return;
  const nota=document.getElementById('nota_input').value.trim();
  try{
    if(c.dbCiclo){
      await sb.from('ciclos').update({notas:nota||null}).eq('id',c.dbCiclo.id);
      const i=ciclos.findIndex(x=>x.id===c.dbCiclo.id);
      if(i>=0)ciclos[i]={...ciclos[i],notas:nota||null};
    } else {
      const diaVal=['martes','jueves'].includes(c.dia)?c.dia:c.cycleId==='mar'?'martes':'jueves';
      const{data,error}=await sb.from('ciclos').insert({
        fecha:c.fecha,dia:diaVal,estado:'abierto',
        panes_trad:c.panesTrad,panes_semi:c.panesSemi,notas:nota||null
      }).select().single();
      if(error)throw error;
      ciclos.unshift(data);
    }
    showToast('✓ Nota guardada');openCicloModalByKey(key);renderCiclos();
  }catch(e){showToast('Error: '+e.message);}
}

async function cerrarCiclo(id){
  try{
    await sb.from('ciclos').update({estado:'cerrado'}).eq('id',id);
    const i=ciclos.findIndex(c=>c.id===id);if(i>=0)ciclos[i]={...ciclos[i],estado:'cerrado'};
    closeModal();showToast('✓ Ciclo cerrado');renderCiclos();
  }catch(e){showToast('Error: '+e.message);}
}

async function eliminarCiclo(id){
  if(!confirm('¿Eliminar este ciclo y sus gastos asociados?'))return;
  try{
    await sb.from('gastos').delete().eq('ciclo_id',id);
    await sb.from('ciclos').delete().eq('id',id);
    ciclos=ciclos.filter(c=>c.id!==id);
    gastos=gastos.filter(g=>g.ciclo_id!==id);
    closeModal();showToast('🗑 Ciclo eliminado');renderCiclos();
  }catch(e){showToast('Error: '+e.message);}
}

// ── GASTOS ────────────────────────────────────────────────────
function renderGastos(){
  const el=document.getElementById('screen-gastos');
  const totalGastos=gastos.reduce((s,g)=>s+g.precio_total,0);
  el.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
      <span class="sec-label" style="margin:0;">Gastos (${gastos.length})</span>
      <button onclick="openNuevoGasto()" style="background:var(--cacao);color:var(--banano);border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:'Quicksand',sans-serif;font-size:12px;font-weight:700;cursor:pointer;">+ Nuevo</button>
    </div>
    <div class="card" style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;">
        <span style="font-size:13px;font-weight:700;color:var(--text-muted);">Total gastos</span>
        <span style="font-size:18px;font-weight:700;color:var(--rojo);">-${fp(totalGastos)}</span>
      </div>
    </div>
    ${gastos.length===0?`<div class="empty-state"><div class="e-icon">💸</div><div class="e-title">Sin gastos registrados</div></div>`
    :gastos.map(g=>`<div class="card" style="margin-bottom:8px;cursor:pointer;" onclick="openEditGasto('${g.id}')">
      <div class="gasto-row" style="border:none;padding:0;">
        <div style="flex:1;">
          <div class="gasto-item">${g.item}</div>
          <span class="gasto-cat ${g.categoria}">${g.categoria}</span>
          <div style="font-size:11px;color:var(--text-muted);margin-top:3px;">${g.fecha}${g.ciclo_id?' · ciclo':''}${g.notas?' · '+g.notas:''}</div>
        </div>
        <div style="text-align:right;flex-shrink:0;">
          <div class="gasto-monto">-${fp(g.precio_total)}</div>
          ${g.cantidad?`<div style="font-size:11px;color:var(--text-muted);">${g.cantidad} ${g.unidad||''}</div>`:''}
          <div style="font-size:10px;color:var(--dorado);font-weight:700;margin-top:4px;">✏️ editar</div>
        </div>
      </div>
    </div>`).join('')}
  `;
}

function openNuevoGasto(cicloId=null){
  const today=new Date().toISOString().slice(0,10);
  openModal(`
    <p class="modal-title">Nuevo gasto</p>
    <div style="margin-bottom:14px;"><label class="form-label">Categoría</label>
      <select class="form-input" id="ng_cat" style="margin-bottom:0;">
        <option value="ingredientes">Ingredientes</option>
        <option value="empaque">Empaque</option>
        <option value="operacion">Operación</option>
        <option value="equipo">Equipo</option>
      </select>
    </div>
    <div style="margin-bottom:14px;"><label class="form-label">Descripción</label>
      <input class="form-input" id="ng_item" type="text" placeholder="Ej: Avena Great Value 900g" style="margin-bottom:0;">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      <div><label class="form-label">Cantidad</label><input class="form-input" id="ng_cant" type="number" placeholder="Ej: 2" style="margin-bottom:0;"></div>
      <div><label class="form-label">Unidad</label><input class="form-input" id="ng_uni" type="text" placeholder="Ej: bolsas" style="margin-bottom:0;"></div>
    </div>
    <div style="margin-bottom:14px;"><label class="form-label">Monto total (₡)</label>
      <input class="form-input" id="ng_monto" type="number" placeholder="₡0" style="margin-bottom:0;">
    </div>
    <div style="margin-bottom:14px;"><label class="form-label">Fecha</label>
      <input class="form-input" id="ng_fecha" type="date" value="${today}" style="margin-bottom:0;">
    </div>
    <div style="margin-bottom:14px;"><label class="form-label">Ciclo asociado (opcional)</label>
      <select class="form-input" id="ng_ciclo" style="margin-bottom:0;">
        <option value="">— Sin ciclo —</option>
        ${buildCiclosFromOrders().map(c=>{
          const dbId=c.dbCiclo?.id||'';
          return`<option value="${dbId}" data-key="${c.key}" ${cicloId===dbId?'selected':''}>${c.fecha} · ${c.dia} (${c.panesTotal} panes)</option>`;
        }).join('')}
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-modal primary" onclick="saveGasto()">Guardar gasto</button>
      <button class="btn-close" onclick="closeModal()">Cancelar</button>
    </div>
  `);
}

function openNuevoGastoParaCiclo(cicloId){closeModal();setTimeout(()=>openNuevoGasto(cicloId),200);}

function openEditGasto(gastoId){
  const g=gastos.find(x=>x.id===gastoId);if(!g)return;
  openModal(`
    <p class="modal-title">✏️ Editar gasto</p>
    <div style="margin-bottom:14px;"><label class="form-label">Categoría</label>
      <select class="form-input" id="eg_cat" style="margin-bottom:0;">
        ${['ingredientes','empaque','operacion','equipo'].map(c=>`<option value="${c}" ${g.categoria===c?'selected':''}>${c.charAt(0).toUpperCase()+c.slice(1)}</option>`).join('')}
      </select>
    </div>
    <div style="margin-bottom:14px;"><label class="form-label">Descripción</label>
      <input class="form-input" id="eg_item" type="text" value="${g.item}" style="margin-bottom:0;">
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;">
      <div><label class="form-label">Cantidad</label><input class="form-input" id="eg_cant" type="number" value="${g.cantidad||''}" placeholder="Ej: 2" style="margin-bottom:0;"></div>
      <div><label class="form-label">Unidad</label><input class="form-input" id="eg_uni" type="text" value="${g.unidad||''}" placeholder="Ej: bolsas" style="margin-bottom:0;"></div>
    </div>
    <div style="margin-bottom:14px;"><label class="form-label">Monto total (₡)</label>
      <input class="form-input" id="eg_monto" type="number" value="${g.precio_total}" style="margin-bottom:0;">
    </div>
    <div style="margin-bottom:14px;"><label class="form-label">Fecha</label>
      <input class="form-input" id="eg_fecha" type="date" value="${g.fecha}" style="margin-bottom:0;">
    </div>
    <div style="margin-bottom:14px;"><label class="form-label">Ciclo asociado (opcional)</label>
      <select class="form-input" id="eg_ciclo" style="margin-bottom:0;">
        <option value="">— Sin ciclo —</option>
        ${buildCiclosFromOrders().map(c=>{
          const dbId=c.dbCiclo?.id||'';
          return`<option value="${dbId}" ${g.ciclo_id===dbId?'selected':''}>${c.fecha} · ${c.dia} (${c.panesTotal} panes)</option>`;
        }).join('')}
      </select>
    </div>
    <div style="margin-bottom:14px;"><label class="form-label">Notas (opcional)</label>
      <input class="form-input" id="eg_notas" type="text" value="${g.notas||''}" placeholder="Observaciones..." style="margin-bottom:0;">
    </div>
    <div class="modal-actions">
      <button class="btn-modal primary" onclick="saveEditGasto('${g.id}')">Guardar cambios</button>
      <button class="btn-modal danger" onclick="eliminarGasto('${g.id}')">🗑 Eliminar gasto</button>
      <button class="btn-close" onclick="closeModal()">Cancelar</button>
    </div>
  `);
}

async function saveEditGasto(gastoId){
  const item=document.getElementById('eg_item').value.trim();
  const monto=parseFloat(document.getElementById('eg_monto').value);
  if(!item){showToast('⚠️ Ingresá una descripción');return;}
  if(!monto||monto<=0){showToast('⚠️ Ingresá un monto válido');return;}
  const btn=event.target;btn.disabled=true;btn.textContent='Guardando...';
  try{
    const updates={
      categoria:document.getElementById('eg_cat').value,
      item,
      cantidad:parseFloat(document.getElementById('eg_cant').value)||null,
      unidad:document.getElementById('eg_uni').value.trim()||null,
      precio_total:monto,
      fecha:document.getElementById('eg_fecha').value,
      ciclo_id:document.getElementById('eg_ciclo').value||null,
      notas:document.getElementById('eg_notas').value.trim()||null,
    };
    const{error}=await sb.from('gastos').update(updates).eq('id',gastoId);
    if(error)throw error;
    const i=gastos.findIndex(x=>x.id===gastoId);
    if(i>=0)gastos[i]={...gastos[i],...updates};
    closeModal();showToast('✓ Gasto actualizado');renderGastos();
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='Guardar cambios';}
}

async function eliminarGasto(gastoId){
  if(!confirm('¿Eliminar este gasto?'))return;
  try{
    const{error}=await sb.from('gastos').delete().eq('id',gastoId);
    if(error)throw error;
    gastos=gastos.filter(x=>x.id!==gastoId);
    closeModal();showToast('🗑 Gasto eliminado');renderGastos();
  }catch(e){showToast('Error: '+e.message);}
}

async function saveGasto(){
  const item=document.getElementById('ng_item').value.trim();
  const monto=parseFloat(document.getElementById('ng_monto').value);
  if(!item){showToast('⚠️ Ingresá una descripción');return;}
  if(!monto||monto<=0){showToast('⚠️ Ingresá un monto válido');return;}
  const btn=event.target;btn.disabled=true;btn.textContent='Guardando...';
  try{
    const cicloSel=document.getElementById('ng_ciclo');
    let cicloId=cicloSel.value||null;
    // Si el ciclo no tiene ID en DB todavía, crearlo
    if(!cicloId&&cicloSel.selectedIndex>0){
      const opt=cicloSel.options[cicloSel.selectedIndex];
      const key=opt.dataset.key;
      if(key){
        const ciclosCalc=buildCiclosFromOrders();
        const cc=ciclosCalc.find(x=>x.key===key);
        if(cc&&!cc.dbCiclo){
          const diaVal=cc.cycleId==='mar'||cc.cycleId==='martes'?'martes':'jueves';
          const{data:newCiclo,error:ec}=await sb.from('ciclos').insert({
            fecha:cc.fecha,dia:diaVal,estado:'abierto',
            panes_trad:cc.panesTrad,panes_semi:cc.panesSemi
          }).select().single();
          if(!ec&&newCiclo){ciclos.unshift(newCiclo);cicloId=newCiclo.id;}
        } else if(cc?.dbCiclo){cicloId=cc.dbCiclo.id;}
      }
    }
    const{data,error}=await sb.from('gastos').insert({
      categoria:document.getElementById('ng_cat').value,
      item,
      cantidad:parseFloat(document.getElementById('ng_cant').value)||null,
      unidad:document.getElementById('ng_uni').value.trim()||null,
      precio_total:monto,
      fecha:document.getElementById('ng_fecha').value,
      ciclo_id:cicloId,
      notas:null,
    }).select().single();
    if(error)throw error;
    gastos.unshift(data);
    closeModal();showToast('✓ Gasto guardado');renderGastos();
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='Guardar gasto';}
}

// ── CONFIG SCREEN ─────────────────────────────────────────────
function renderConfigScreen(){
  const el=document.getElementById('screen-config');
  const cfgItems=[
    ['costo_ing_trad',       'Costo ingredientes Tradicional (₡/pan)'],
    ['costo_ing_semi',       'Costo ingredientes Con Semillas (₡/pan)'],
    ['costo_empaque_base',   'Costo empaque base (₡/pan)'],
    ['costo_amort_pan',      'Amortización equipo (₡/pan)'],
    ['panes_amort_total',    'Panes para amortizar equipo'],
    ['precio_trad',          'Precio venta Tradicional (₡)'],
    ['precio_semi',          'Precio venta Con Semillas (₡)'],
    ['costo_papel_hornear',  'Papel para hornear (₡/pliego)'],
    ['costo_papel_encerado', 'Papel encerado (₡/pliego)'],
    ['costo_bolsa_enfriar',  'Bolsa para enfriar (₡/und)'],
    ['costo_bolsa_kraft',    'Bolsa kraft (₡/und)'],
    ['costo_sticker',        'Sticker (₡/und)'],
  ];
  el.innerHTML=`
    <span class="sec-label">Supuestos financieros</span>
    <p style="font-size:12px;color:var(--text-muted);margin-bottom:14px;line-height:1.6;">Editá estos valores cuando cambien tus costos. Se usan para calcular ganancias y márgenes.</p>
    <div class="card">
      ${cfgItems.map(([clave,label])=>`
        <div class="fin-row" style="flex-direction:column;align-items:flex-start;gap:6px;">
          <label class="form-label" style="margin:0;">${label}</label>
          <div style="display:flex;gap:8px;width:100%;align-items:center;">
            <span style="font-size:14px;font-weight:700;color:var(--text-muted);">₡</span>
            <input class="form-input" id="cfg_${clave}" type="number" value="${cfg[clave]||0}" style="margin-bottom:0;flex:1;">
          </div>
        </div>`).join('')}
      <button class="btn-primary" style="margin-top:14px;" onclick="saveAllConfig()">Guardar supuestos</button>
    </div>
    <span class="sec-label" style="margin-top:16px;">Panes acumulados</span>
    <div class="card">
      <div class="fin-row"><span class="fin-label">Total producidos</span><span class="fin-val">${panesAcum} panes</span></div>
      <div class="fin-row"><span class="fin-label">Amortización</span><span class="fin-val">${panesAcum>=(cfg.panes_amort_total||100)?'✅ Completada':'En curso'}</span></div>
      <div style="margin-top:12px;display:flex;gap:8px;align-items:center;">
        <input class="form-input" id="panes_manual" type="number" value="${panesAcum}" style="margin-bottom:0;flex:1;">
        <button onclick="saveManualPanes()" style="background:var(--cacao);color:var(--banano);border:none;border-radius:var(--radius-sm);padding:11px 14px;font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;">Actualizar</button>
      </div>
    </div>
    <span class="sec-label" style="margin-top:16px;">Conexión</span>
    <div class="card">
      <p style="font-size:12px;font-weight:700;color:var(--cacao);word-break:break-all;margin-bottom:12px;">${loadConfig().url||'No configurado'}</p>
      <button onclick="if(confirm('¿Borrar credenciales?')){localStorage.removeItem('sb_url_fin');localStorage.removeItem('sb_key_fin');location.reload();}" style="font-family:'Quicksand',sans-serif;font-size:13px;font-weight:700;padding:10px 16px;border-radius:var(--radius-sm);border:0.5px solid var(--border-strong);background:transparent;cursor:pointer;color:var(--cacao);width:100%;">Reconfigurar</button>
    </div>
    <div style="text-align:center;margin-top:20px;">
      <a href="/bananisimo/" style="font-size:13px;font-weight:700;color:var(--dorado);text-decoration:none;">← Volver a app de pedidos</a>
    </div>
  `;
}

async function saveAllConfig(){
  const btn=event.target;btn.disabled=true;btn.textContent='Guardando...';
  try{
    const keys=['costo_ing_trad','costo_ing_semi','costo_empaque_base','costo_amort_pan','panes_amort_total','precio_trad','precio_semi','costo_papel_hornear','costo_papel_encerado','costo_bolsa_enfriar','costo_bolsa_kraft','costo_sticker'];
    for(const k of keys){
      const val=parseFloat(document.getElementById('cfg_'+k)?.value)||0;
      await sb.from('config_finanzas').upsert({clave:k,valor:val,updated_at:new Date().toISOString()});
      cfg[k]=val;
    }
    showToast('✓ Supuestos guardados');btn.disabled=false;btn.textContent='Guardar supuestos';
    updateAmortBadge();
  }catch(e){showToast('Error: '+e.message);btn.disabled=false;btn.textContent='Guardar supuestos';}
}

async function saveManualPanes(){
  const val=parseInt(document.getElementById('panes_manual').value)||0;
  try{
    await sb.from('panes_acumulados').update({total:val}).eq('id',1);
    panesAcum=val;updateAmortBadge();showToast('✓ Panes actualizados');renderConfigScreen();
  }catch(e){showToast('Error: '+e.message);}
}

// ── SERVICE WORKER ────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/bananisimo/finanzas/sw.js',{scope:'/bananisimo/finanzas/'}).then(reg=>{
      reg.addEventListener('updatefound',()=>{
        const nw=reg.installing;
        nw.addEventListener('statechange',()=>{
          if(nw.state==='installed'&&navigator.serviceWorker.controller)showToast('🍌 Nueva versión disponible — recargá',5000);
        });
      });
    });
  });
}

initApp();
</script>
